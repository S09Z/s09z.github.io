document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"fc0ed4b0-7ce2-44be-a671-d368edaffd1a\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"7e3cbd7c-540c-4f3b-af03-cb34e98e9888\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============ Terminal addons CSS ============\n   Boot loader · Projects · Avatar · Tweaks panel · Command palette\n   Light theme · Mobile · Reduced motion\n============================================ */\n\n/* ── BOOT LOADER ────────────────────────────── */\n.boot{position:fixed;inset:0;z-index:200;background:var(--ink);display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:48px 64px;font-family:var(--mono);color:var(--paper);font-size:13px;line-height:1.7;transition:opacity .5s, transform .6s;overflow:hidden}\n.boot.gone{opacity:0;pointer-events:none;transform:scale(1.04);visibility:hidden;transition:opacity .6s, transform .6s, visibility 0s .6s}\n.boot::before{content:\"\";position:absolute;inset:0;background:repeating-linear-gradient(to bottom,rgba(255,255,255,0.03) 0,rgba(255,255,255,0.03) 1px,transparent 1px,transparent 3px);pointer-events:none}\n.boot-head{font-size:11px;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:24px;display:flex;gap:14px;align-items:center}\n.boot-head .led{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 1.2s infinite}\n.boot-log{display:flex;flex-direction:column;gap:2px;font-size:13px;width:100%;max-width:680px}\n.boot-line{display:flex;gap:10px;color:var(--paper-dim);opacity:0;animation:bootIn .25s ease forwards}\n.boot-line.ok::before{content:\"[ OK ]\";color:var(--accent);font-weight:500;flex:0 0 auto;letter-spacing:.05em}\n.boot-line.warn::before{content:\"[WARN]\";color:oklch(0.78 0.18 60);font-weight:500;flex:0 0 auto}\n.boot-line.info::before{content:\"[INFO]\";color:oklch(0.82 0.14 200);font-weight:500;flex:0 0 auto}\n.boot-line.done::before{content:\"[DONE]\";color:var(--paper);font-weight:500;flex:0 0 auto}\n.boot-line b{color:var(--paper);font-weight:500}\n.boot-line .accent{color:var(--accent)}\n@keyframes bootIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}\n.boot-cursor{display:inline-block;width:8px;height:14px;background:var(--accent);margin-left:6px;animation:blink 1s steps(1) infinite;vertical-align:middle}\n.boot-prompt{margin-top:18px;font-size:14px;color:var(--paper);opacity:0;animation:bootIn .4s ease forwards}\n\n/* ── AVATAR (ASCII dithered placeholder) ────── */\n.avatar{width:120px;height:120px;display:grid;place-items:center;background:var(--ink-2);border:1px solid var(--line-strong);position:relative;overflow:hidden;font-family:var(--mono)}\n.avatar::before{content:\"\";position:absolute;inset:0;background:\n  radial-gradient(circle at 50% 38%, rgba(232,232,240,0.35) 0 18%, transparent 19%),\n  radial-gradient(ellipse at 50% 95%, rgba(232,232,240,0.25) 0 35%, transparent 36%),\n  repeating-linear-gradient(45deg, rgba(143,108,255,0.08) 0 2px, transparent 2px 4px);\n  filter:contrast(1.2)}\n.avatar::after{content:\"S09Z\";position:absolute;bottom:6px;right:8px;font-size:9px;color:var(--paper-mute);letter-spacing:.18em;z-index:2}\n.avatar .tag{position:absolute;top:6px;left:8px;font-size:9px;color:var(--accent);letter-spacing:.18em;text-transform:uppercase;z-index:2}\n\n/* ── PROJECTS ───────────────────────────────── */\n.projects{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}\n.proj{background:var(--ink-2);border:1px solid var(--line-strong);padding:0;display:flex;flex-direction:column;text-decoration:none;color:inherit;transition:transform .3s, border-color .25s, background .25s;cursor:none;position:relative;overflow:hidden}\n.proj:hover{transform:translateY(-4px);border-color:var(--accent);background:#0f0f18}\n.proj:hover .proj-img{filter:none}\n.proj-img{height:180px;background:linear-gradient(135deg, oklch(0.30 0.10 295), oklch(0.18 0.06 280));position:relative;overflow:hidden;border-bottom:1px solid var(--line-strong);filter:saturate(.7);transition:filter .35s}\n.proj-img::before{content:\"\";position:absolute;inset:0;background-image:\n  repeating-linear-gradient(0deg, rgba(0,0,0,0.22) 0 1px, transparent 1px 4px),\n  repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 80px)}\n.proj-img .glyph{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--display);font-size:96px;font-weight:600;color:var(--paper);opacity:.85;letter-spacing:-.04em;text-shadow:0 4px 24px rgba(0,0,0,0.5)}\n.proj-img .badge{position:absolute;top:12px;left:12px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;background:var(--ink);color:var(--accent);padding:4px 8px;border:1px solid var(--accent)}\n.proj-img .yr{position:absolute;top:12px;right:12px;font-size:10px;color:var(--paper-dim);font-family:var(--mono)}\n.proj-body{padding:20px;display:flex;flex-direction:column;gap:8px;flex:1}\n.proj-body h3{font-family:var(--display);font-weight:500;font-size:20px;color:var(--paper);letter-spacing:-.01em}\n.proj-body .role{font-size:10px;color:var(--paper-mute);text-transform:uppercase;letter-spacing:.16em}\n.proj-body p{font-size:13px;color:var(--paper-dim);line-height:1.55;margin-top:4px;flex:1}\n.proj-body .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:auto;padding-top:12px;border-top:1px dashed var(--line)}\n.proj-body .tags span{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border:1px solid var(--line-strong);color:var(--paper-dim);border-radius:1px}\n.proj .open{position:absolute;bottom:18px;right:18px;font-size:10px;color:var(--paper-mute);letter-spacing:.18em;text-transform:uppercase;opacity:0;transition:opacity .25s, transform .25s}\n.proj:hover .open{opacity:1;color:var(--accent);transform:translateX(4px)}\n\n/* Hero avatar slot adjustment */\n.hero-grid.hero-grid-with-avatar{display:grid;grid-template-columns:140px 1fr 360px;gap:36px;align-items:end}\n\n/* ── TWEAKS PANEL ───────────────────────────── */\n.tw-toggle{position:fixed;left:32px;bottom:32px;width:48px;height:48px;border:1px solid var(--line-strong);background:rgba(10,10,16,0.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--paper);font-family:var(--mono);display:flex;align-items:center;justify-content:center;cursor:none;z-index:40;font-size:18px;transition:border-color .25s, color .25s, background .25s, box-shadow .25s;padding:0}\n.tw-toggle:hover{border-color:var(--accent);color:var(--accent);background:rgba(143,108,255,0.08);box-shadow:0 0 20px rgba(143,108,255,0.25)}\n.tw-toggle.open{border-color:var(--accent);color:var(--accent)}\n.tw-panel{position:fixed;left:32px;bottom:88px;width:280px;background:rgba(10,10,16,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--line-strong);color:var(--paper);font-family:var(--mono);font-size:12px;z-index:41;padding:0;opacity:0;pointer-events:none;transform:translateY(8px) scale(.96);transform-origin:bottom left;transition:opacity .25s, transform .25s}\n.tw-panel.open{opacity:1;pointer-events:auto;transform:translateY(0) scale(1)}\n.tw-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line-strong);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--paper-mute)}\n.tw-head b{color:var(--paper);font-weight:500}\n.tw-head .x{background:none;border:0;color:var(--paper-mute);cursor:none;font-size:14px;line-height:1;padding:0}\n.tw-head .x:hover{color:var(--accent)}\n.tw-body{padding:12px 14px;display:flex;flex-direction:column;gap:14px}\n.tw-row{display:flex;flex-direction:column;gap:6px}\n.tw-row .lbl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--paper-mute);display:flex;justify-content:space-between}\n.tw-row .lbl b{color:var(--paper);font-weight:400;letter-spacing:.04em;text-transform:none;font-size:11px}\n.tw-swatches{display:flex;gap:6px}\n.tw-swatch{width:26px;height:26px;border:1px solid var(--line-strong);cursor:none;padding:0;border-radius:0;transition:transform .2s, border-color .2s}\n.tw-swatch:hover{transform:scale(1.1)}\n.tw-swatch.active{border-color:var(--paper);box-shadow:0 0 0 1px var(--paper) inset}\n.tw-seg{display:flex;border:1px solid var(--line-strong)}\n.tw-seg button{flex:1;padding:7px 6px;background:transparent;border:0;border-right:1px solid var(--line-strong);color:var(--paper-dim);font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:none;transition:background .2s, color .2s}\n.tw-seg button:last-child{border-right:none}\n.tw-seg button:hover{color:var(--paper)}\n.tw-seg button.on{background:var(--accent);color:var(--ink)}\n.tw-row .hint{font-size:10px;color:var(--paper-mute);line-height:1.4;margin-top:4px}\n.tw-row .hint kbd{display:inline-block;padding:1px 5px;border:1px solid var(--line-strong);font-size:10px;color:var(--paper);font-family:var(--mono);border-radius:2px}\n\n/* ── COMMAND PALETTE ─────────────────────── */\n.cmd-overlay{position:fixed;inset:0;z-index:80;background:rgba(8,8,16,0.78);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding-top:120px;cursor:none}\n.cmd-overlay.open{display:flex}\n.cmd-box{width:min(720px, 92vw);background:rgba(10,10,16,0.95);border:1px solid var(--accent);box-shadow:0 24px 80px rgba(0,0,0,0.6), 0 0 32px rgba(143,108,255,0.2);font-family:var(--mono);color:var(--paper);display:flex;flex-direction:column;max-height:70vh}\n.cmd-head{padding:10px 16px;border-bottom:1px solid var(--line-strong);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--paper-mute);display:flex;justify-content:space-between;align-items:center}\n.cmd-head b{color:var(--accent)}\n.cmd-history{padding:14px 18px;max-height:300px;overflow-y:auto;font-size:13px;line-height:1.55;flex:1}\n.cmd-history::-webkit-scrollbar{width:6px}\n.cmd-history::-webkit-scrollbar-thumb{background:var(--line-strong)}\n.cmd-line{display:flex;gap:10px;color:var(--paper-dim);margin-bottom:4px}\n.cmd-line.you{color:var(--paper)}\n.cmd-line.you::before{content:\"$\";color:var(--accent);flex:0 0 auto}\n.cmd-line.out::before{content:\" \";color:var(--paper-mute);flex:0 0 auto;width:8px}\n.cmd-line.err{color:oklch(0.7 0.18 25)}\n.cmd-line.err::before{content:\"!\";color:oklch(0.7 0.18 25);flex:0 0 auto}\n.cmd-line.ok{color:var(--accent)}\n.cmd-line.ok::before{content:\"✓\";color:var(--accent);flex:0 0 auto;width:8px}\n.cmd-input-row{display:flex;align-items:center;padding:12px 18px;border-top:1px solid var(--line-strong);background:var(--ink-2);gap:10px}\n.cmd-input-row .caret{color:var(--accent);font-size:14px}\n.cmd-input{flex:1;background:transparent;border:0;color:var(--paper);font-family:var(--mono);font-size:14px;outline:none;cursor:text}\n.cmd-input::placeholder{color:var(--paper-mute)}\n.cmd-foot{padding:8px 18px;border-top:1px solid var(--line);font-size:10px;color:var(--paper-mute);letter-spacing:.14em;text-transform:uppercase;display:flex;justify-content:space-between}\n.cmd-foot kbd{display:inline-block;padding:1px 5px;border:1px solid var(--line-strong);font-size:10px;color:var(--paper);font-family:var(--mono);border-radius:2px;margin:0 2px}\n\n/* ── LIGHT THEME ───────────────────────────── */\nbody.theme-light{\n  --ink:#f6f4ef;\n  --ink-2:#ece9e1;\n  --paper:#16161c;\n  --paper-dim:#4a4a58;\n  --paper-mute:#888894;\n  --line:rgba(22,22,28,0.10);\n  --line-strong:rgba(22,22,28,0.22);\n}\nbody.theme-light #bg{opacity:.32}\nbody.theme-light .crt{mix-blend-mode:multiply;opacity:.4}\nbody.theme-light .cursor-ring{mix-blend-mode:difference}\nbody.theme-light .topbar{background:rgba(246,244,239,0.85)}\nbody.theme-light .tw-toggle,\nbody.theme-light .to-top,\nbody.theme-light .tw-panel{background:rgba(246,244,239,0.85)}\nbody.theme-light .proj-img{filter:saturate(.5) brightness(1.1)}\nbody.theme-light .avatar{background:var(--ink-2)}\nbody.theme-light .boot{background:var(--ink)}\nbody.theme-light .cmd-overlay{background:rgba(246,244,239,0.78)}\nbody.theme-light .cmd-box{background:rgba(246,244,239,0.96)}\nbody.theme-light .tech .ico img.mono{filter:invert(1)}\nbody.theme-light .strip,\nbody.theme-light .timeline,\nbody.theme-light .hero-meta .row:first-child{border-color:var(--line-strong)}\n\n/* ── ACCENT VARIANTS ───────────────────────── */\nbody[data-accent=\"cyan\"]{--accent:oklch(0.78 0.14 200)}\nbody[data-accent=\"amber\"]{--accent:oklch(0.80 0.16 75)}\nbody[data-accent=\"green\"]{--accent:oklch(0.80 0.20 145)}\n\n/* ── REDUCED MOTION ────────────────────────── */\n@media (prefers-reduced-motion: reduce){\n  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.05ms !important}\n  html,body{scroll-behavior:auto !important}\n  #bg{display:none}\n  .crt::before{display:none}\n}\nbody.motion-off *,\nbody.motion-off *::before,\nbody.motion-off *::after{animation:none !important;transition:none !important}\nbody.motion-off #bg,\nbody.motion-off .crt,\nbody.motion-off .strip-track{display:none}\nbody.motion-off .ch{transform:none !important}\n\n/* ── SCANLINE INTENSITY ────────────────────── */\nbody[data-scan=\"off\"] .crt{display:none}\nbody[data-scan=\"low\"] .crt::before{opacity:.4}\nbody[data-scan=\"high\"] .crt::before{opacity:1.4}\n\n/* ── CURSOR STYLE: dot ─────────────────────── */\nbody[data-cursor=\"dot\"] .cursor-ring{display:none}\nbody[data-cursor=\"dot\"] .cursor-dot{width:14px;height:14px}\nbody[data-cursor=\"native\"] {cursor:auto}\nbody[data-cursor=\"native\"] .cursor-ring,\nbody[data-cursor=\"native\"] .cursor-dot{display:none}\nbody[data-cursor=\"native\"] *{cursor:auto !important}\nbody[data-cursor=\"native\"] a,\nbody[data-cursor=\"native\"] button,\nbody[data-cursor=\"native\"] .tech,\nbody[data-cursor=\"native\"] .clink,\nbody[data-cursor=\"native\"] .proj{cursor:pointer !important}\n\n/* ── MOBILE ────────────────────────────────── */\n@media (max-width: 900px){\n  html,body{cursor:auto;font-size:13px}\n  .cursor-ring,.cursor-dot{display:none}\n  *{cursor:auto !important}\n  a,button,.tech,.clink,.proj{cursor:pointer !important}\n\n  .topbar{grid-template-columns:1fr auto;padding:14px 20px;gap:12px}\n  .topbar nav{display:none}\n  .topbar .meta{display:none}\n  .topbar .brand{font-size:13px}\n\n  section{padding:48px 20px;scroll-margin-top:64px}\n  .hero{padding:64px 20px 48px}\n  .hero-grid,.hero-grid-with-avatar,.hero-row{grid-template-columns:1fr;gap:24px}\n  .hero-name-block{padding-right:0;margin-bottom:32px}\n  .hero-name-block .name-thai{font-size:16px}\n  .orbit{display:none}\n  h1.name{font-size:56px;line-height:.95}\n  .name-thai{font-size:16px}\n\n  .strip{padding:10px 0;font-size:11px}\n\n  .sec-head{grid-template-columns:1fr;gap:8px;margin-bottom:24px}\n  .sec-tag{flex-direction:row;gap:14px;align-items:center}\n  .sec-title{font-size:28px;line-height:1.1}\n\n  .about-grid{grid-template-columns:1fr;gap:24px}\n  .about-aside{flex-direction:row;flex-wrap:wrap;gap:8px}\n  .about-aside .stat{flex:1;min-width:90px;padding:10px}\n  .about-aside .stat .val{font-size:24px}\n\n  .projects{grid-template-columns:1fr;gap:16px}\n  .proj-img{height:140px}\n  .proj-img .glyph{font-size:64px}\n\n  .stack-cat{grid-template-columns:1fr;gap:16px;padding:20px 0}\n  .stack-icons{gap:4px}\n  .tech{width:84px;padding:12px 6px}\n\n  .tl{grid-template-columns:1fr;gap:12px;padding:24px 0}\n  .tl .when{flex-direction:row;gap:8px;font-size:11px}\n  .tl .role .pos{font-size:18px}\n  .tl .stack{flex-direction:row}\n\n  .contact{padding:64px 20px}\n  .contact-grid{grid-template-columns:1fr;gap:24px}\n  .contact h2{font-size:48px}\n  .clink{grid-template-columns:80px 1fr auto;gap:12px;padding:16px 0;font-size:14px}\n\n  .to-top{right:16px;bottom:16px;width:48px;height:48px}\n  .tw-toggle{left:16px;bottom:16px;width:42px;height:42px;font-size:16px}\n  .tw-panel{left:16px;right:16px;width:auto;bottom:72px}\n\n  .boot{padding:32px 20px;font-size:12px}\n  .boot-log{font-size:12px}\n}\n<\u002Fstyle>\n\n<style>\n  :root{\n    --ink:#0a0a10;\n    --ink-2:#0f0f18;\n    --paper:#e8e8f0;\n    --paper-dim:#9a9aac;\n    --paper-mute:#5a5a6c;\n    --line:rgba(232,232,240,0.08);\n    --line-strong:rgba(232,232,240,0.18);\n    --accent:oklch(0.74 0.18 295);\n    --accent-2:oklch(0.82 0.14 200);\n    --warn:oklch(0.78 0.18 60);\n    --mono:'JetBrains Mono', ui-monospace, Menlo, monospace;\n    --display:'Space Grotesk', sans-serif;\n    --thai:'Noto Sans Thai', sans-serif;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:14px;line-height:1.55;cursor:none;scroll-behavior:smooth}\n  body{position:relative;overflow-x:hidden;min-height:100vh}\n  a{color:inherit;text-decoration:none}\n  ::selection{background:var(--accent);color:var(--ink)}\n\n  /* WebGL canvas (noise mesh) */\n  #bg{position:fixed;inset:0;z-index:0;opacity:0.55;pointer-events:none}\n  /* Scanlines + CRT vignette */\n  .crt{position:fixed;inset:0;z-index:1;pointer-events:none;mix-blend-mode:overlay}\n  .crt::before{content:\"\";position:absolute;inset:0;background:repeating-linear-gradient(to bottom,rgba(255,255,255,0.04) 0,rgba(255,255,255,0.04) 1px,transparent 1px,transparent 3px)}\n  .crt::after{content:\"\";position:absolute;inset:0;background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.6) 100%)}\n  /* Liquid cursor */\n  .cursor-ring{position:fixed;left:0;top:0;width:36px;height:36px;border:1px solid var(--accent);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:99;mix-blend-mode:exclusion;transition:width .25s, height .25s, border-color .25s}\n  .cursor-dot{position:fixed;left:0;top:0;width:6px;height:6px;background:var(--accent);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:100}\n  .cursor-ring.hover{width:64px;height:64px;border-color:var(--accent-2)}\n  .cursor-ring.text{width:8px;height:28px;border-radius:1px;background:var(--accent);border:none}\n\n  /* Layout */\n  main{position:relative;z-index:2;max-width:1280px;margin:0 auto;padding:0}\n\n  /* Top bar */\n  .topbar{display:grid;grid-template-columns:120px 1fr auto;align-items:center;padding:18px 48px;border-bottom:1px solid var(--line);font-size:12px;color:var(--paper-dim);position:sticky;top:0;z-index:30;background:rgba(10,10,16,0.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}\n  .brand{display:flex;gap:8px;align-items:center;color:var(--paper)}\n  .brand .blip{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 1.6s infinite}\n  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}\n  .topbar nav{display:flex;gap:24px;justify-content:center}\n  .topbar nav a{padding:4px 0;border-bottom:1px solid transparent;transition:border-color .2s,color .2s;position:relative}\n  .topbar nav a:hover{color:var(--paper);border-color:var(--accent)}\n  .topbar nav a.active{color:var(--paper)}\n  .topbar nav a.active::after{content:\"\";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:navIn .35s ease}\n  @keyframes navIn{from{transform:scaleX(0);opacity:0}to{transform:scaleX(1);opacity:1}}\n  .topbar .meta{display:flex;gap:16px;align-items:center}\n  .topbar .meta span{display:inline-flex;gap:6px;align-items:center}\n  .led{width:6px;height:6px;border-radius:50%;background:var(--accent-2);box-shadow:0 0 8px var(--accent-2)}\n\n  /* Hero */\n  .hero{padding:96px 48px 80px;border-bottom:1px solid var(--line);position:relative;overflow:hidden}\n  .hero-name-block{position:relative;z-index:1;margin-bottom:48px;padding-right:280px}\n  .hero-row{display:flex;flex-direction:row;gap:28px;max-width:720px;position:relative;z-index:1;align-items:stretch}\n  .hero-row > .avatar{flex:0 0 50%;width:50%;min-width:0;height:auto;min-height:240px;aspect-ratio:auto}\n  .hero-row > .hero-meta{flex:0 0 calc(50% - 28px);width:calc(50% - 28px);min-width:0}\n  .hero-prompt{color:var(--paper-mute);font-size:13px;margin-bottom:24px;display:flex;gap:12px;align-items:center}\n  .hero-prompt .caret{color:var(--accent)}\n  .hero-prompt .typed{color:var(--paper)}\n  .hero-prompt .blink{display:inline-block;width:8px;height:14px;background:var(--paper);margin-left:4px;animation:blink 1s steps(1) infinite}\n  @keyframes blink{50%{opacity:0}}\n\n  h1.name{font-family:var(--display);font-weight:500;font-size:120px;line-height:.92;letter-spacing:-.045em;color:var(--paper);position:relative}\n  h1.name .lt{color:var(--accent);font-family:var(--mono);font-weight:300;font-size:.85em;letter-spacing:-.02em}\n  .name-thai{font-family:var(--thai);font-weight:300;font-size:24px;color:var(--paper-dim);margin-top:24px;letter-spacing:.04em;max-width:none}\n  .name-thai b{color:var(--paper);font-weight:600}\n\n  .hero-meta{display:flex;flex-direction:column;gap:14px;font-size:12px}\n  .hero-meta .row{display:grid;grid-template-columns:88px 1fr;gap:12px;padding:8px 0;border-top:1px dashed var(--line)}\n  .hero-meta .row:first-child{border-top:1px solid var(--line-strong)}\n  .hero-meta .k{color:var(--paper-mute);text-transform:uppercase;letter-spacing:.12em;font-size:10px}\n  .hero-meta .v{color:var(--paper)}\n  .hero-meta .v em{font-style:normal;color:var(--accent)}\n\n  /* Orbit kinetic stack */\n  .orbit{position:absolute;right:48px;top:60px;width:220px;height:220px;pointer-events:none;z-index:0;opacity:.55}\n  .orbit svg{width:100%;height:100%}\n  .orbit text{font-family:var(--mono);font-size:11px;fill:var(--paper-dim);letter-spacing:.18em;text-transform:uppercase}\n  .orbit .ring{fill:none;stroke:var(--line-strong)}\n  .orbit .nucleus{fill:var(--accent);filter:drop-shadow(0 0 14px var(--accent))}\n  .orbit-anim{animation:spin 50s linear infinite}\n  .orbit-anim.rev{animation-direction:reverse;animation-duration:80s}\n  @keyframes spin{to{transform:rotate(360deg)}}\n\n  /* Section header */\n  section{padding:80px 48px;border-bottom:1px solid var(--line);position:relative;scroll-margin-top:80px}\n  .sec-head{display:grid;grid-template-columns:200px 1fr;gap:48px;margin-bottom:48px;align-items:start}\n  .sec-tag{font-size:11px;color:var(--paper-mute);text-transform:uppercase;letter-spacing:.18em;display:flex;flex-direction:column;gap:6px}\n  .sec-tag .num{color:var(--accent);font-size:13px}\n  .sec-tag .thai{font-family:var(--thai);text-transform:none;letter-spacing:.06em;color:var(--paper-dim);font-size:12px}\n  .sec-title{font-family:var(--display);font-weight:400;font-size:48px;line-height:1.05;letter-spacing:-.02em;color:var(--paper)}\n  .sec-title .accent{color:var(--accent)}\n\n  /* Section arrival flash */\n  section.flash::before{content:\"\";position:absolute;inset:0;background:radial-gradient(ellipse at top, var(--accent) 0%, transparent 55%);opacity:0;pointer-events:none;animation:flashIn 1.1s ease-out forwards;mix-blend-mode:overlay;z-index:0}\n  @keyframes flashIn{0%{opacity:0}15%{opacity:.35}100%{opacity:0}}\n  section.flash .sec-tag .num{animation:numFlash 1.1s ease-out}\n  @keyframes numFlash{0%,100%{color:var(--accent)}30%{color:var(--paper);text-shadow:0 0 12px var(--accent)}}\n\n  /* Jump indicator (cursor-attached pulse during scroll) */\n  .jump-indicator{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:97;opacity:0;font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;text-align:center}\n  .jump-indicator.on{animation:jumpOn .9s ease}\n  .jump-indicator .ring{width:120px;height:120px;border:1px solid var(--accent);border-radius:50%;margin:0 auto 14px;position:relative}\n  .jump-indicator .ring::before,.jump-indicator .ring::after{content:\"\";position:absolute;inset:0;border:1px solid var(--accent);border-radius:50%;animation:ringPulse 1.2s ease-out infinite}\n  .jump-indicator .ring::after{animation-delay:.35s}\n  @keyframes ringPulse{0%{transform:scale(.4);opacity:.9}100%{transform:scale(1.6);opacity:0}}\n  @keyframes jumpOn{0%{opacity:0;transform:translate(-50%,-50%) scale(.85)}20%{opacity:1;transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0}}\n  .about-grid{display:grid;grid-template-columns:200px 1fr 280px;gap:48px;align-items:start}\n  .about-body{font-size:18px;line-height:1.65;color:var(--paper);max-width:60ch;font-family:var(--display);font-weight:400}\n  .about-body p+p{margin-top:18px}\n  .about-body .mute{color:var(--paper-dim)}\n  .about-aside{font-size:11px;color:var(--paper-mute);display:flex;flex-direction:column;gap:10px}\n  .about-aside .stat{padding:14px;border:1px solid var(--line-strong);position:relative}\n  .about-aside .stat .label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--paper-mute)}\n  .about-aside .stat .val{font-family:var(--display);font-size:36px;color:var(--paper);margin-top:6px;font-weight:500}\n  .about-aside .stat .val sup{font-size:14px;color:var(--accent);margin-left:4px;vertical-align:top}\n\n  /* Stack */\n  .stack{display:flex;flex-direction:column;gap:0}\n  .stack-cat{display:grid;grid-template-columns:200px 1fr;gap:48px;padding:28px 0;border-bottom:1px solid var(--line);align-items:start}\n  .stack-cat:first-child{border-top:1px solid var(--line-strong)}\n  .stack-cat:last-child{border-bottom:none}\n  .stack-cat-label{display:flex;flex-direction:column;gap:6px;padding-top:18px}\n  .stack-cat-label .ct{font-size:11px;color:var(--paper-mute);text-transform:uppercase;letter-spacing:.2em;font-family:var(--mono)}\n  .stack-cat-label .nm{font-size:18px;color:var(--paper);font-family:var(--display);font-weight:500;letter-spacing:-.01em}\n  .stack-cat-label .meta{font-size:10px;color:var(--paper-mute);text-transform:uppercase;letter-spacing:.16em;margin-top:4px}\n  .stack-cat-label .meta b{color:var(--accent);font-weight:400}\n  .stack-icons{display:flex;flex-wrap:wrap;gap:6px}\n  .tech{display:flex;flex-direction:column;align-items:center;gap:12px;text-decoration:none;width:104px;padding:18px 8px;border:1px solid transparent;transition:background .25s, border-color .25s;cursor:none}\n  .tech:hover{background:rgba(232,232,240,0.03);border-color:var(--line-strong)}\n  .tech .ico{position:relative;width:34px;height:34px;display:inline-block;transition:transform .25s}\n  .tech:hover .ico{transform:scale(1.1)}\n  .tech .ico img{position:absolute;inset:0;width:100%;height:100%;transition:opacity .25s}\n  .tech .ico img.brand{opacity:0}\n  .tech:hover .ico img.mono{opacity:0}\n  .tech:hover .ico img.brand{opacity:1}\n  .tech .nm{font-size:11px;color:var(--paper-dim);text-align:center;font-family:var(--mono);letter-spacing:.04em;transition:color .2s;white-space:nowrap}\n  .tech:hover .nm{color:var(--paper)}\n  .tech .yr{font-size:9px;color:var(--paper-mute);font-family:var(--mono);letter-spacing:.08em}\n\n  /* Experience timeline */\n  .timeline{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--line-strong)}\n  .tl{display:grid;grid-template-columns:200px 1fr 360px;gap:48px;padding:36px 0;border-bottom:1px solid var(--line);position:relative}\n  .tl .when{font-size:12px;color:var(--paper-dim);font-family:var(--mono);display:flex;flex-direction:column;gap:4px}\n  .tl .when .dot{display:inline-flex;gap:8px;align-items:center}\n  .tl .when .dot::before{content:\"\";width:6px;height:6px;border-radius:50%;background:var(--paper-mute)}\n  .tl.now .when .dot::before{background:var(--accent);box-shadow:0 0 10px var(--accent)}\n  .tl .role{display:flex;flex-direction:column;gap:8px}\n  .tl .role .pos{font-family:var(--display);font-size:24px;font-weight:500;color:var(--paper);letter-spacing:-.01em}\n  .tl .role .org{font-size:13px;color:var(--paper-dim)}\n  .tl .role .desc{font-size:14px;color:var(--paper-dim);line-height:1.6;margin-top:6px;max-width:50ch}\n  .tl .stack{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start}\n  .tl .stack span{font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--line-strong);color:var(--paper-dim);border-radius:2px}\n\n  /* Contact */\n  .contact{padding:120px 48px}\n  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:end}\n  .contact h2{font-family:var(--display);font-weight:400;font-size:84px;line-height:.95;letter-spacing:-.03em}\n  .contact h2 .blk{color:var(--paper-mute)}\n  .contact h2 .accent{color:var(--accent)}\n  .contact-thai{font-family:var(--thai);font-size:18px;color:var(--paper-dim);margin-top:20px}\n  .contact-links{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--line-strong)}\n  .clink{display:grid;grid-template-columns:90px 1fr auto;gap:20px;padding:20px 0;border-bottom:1px solid var(--line);align-items:center;font-size:18px;color:var(--paper);transition:padding .25s,color .25s}\n  .clink:hover{padding-left:14px;color:var(--accent)}\n  .clink .lbl{font-size:10px;color:var(--paper-mute);text-transform:uppercase;letter-spacing:.18em}\n  .clink .arr{opacity:.5;transition:opacity .25s,transform .25s}\n  .clink:hover .arr{opacity:1;transform:translateX(6px);color:var(--accent)}\n\n  /* Footer */\n  footer{padding:24px 48px;font-size:11px;color:var(--paper-mute);display:flex;justify-content:space-between;border-top:1px solid var(--line-strong)}\n  footer .ascii{font-family:var(--mono);white-space:pre;line-height:1;color:var(--paper-mute);opacity:.5}\n\n  /* Liquid hover utility */\n  .liq{display:inline-block}\n  .ch{display:inline-block;will-change:transform;transition:transform .12s ease-out, color .2s}\n\n  /* Typewriter (cursor typo) effect */\n  [data-typer]{position:relative;display:inline-block;color:var(--paper)}\n  [data-typer] .typer-ghost{visibility:hidden;font-style:normal}\n  [data-typer] .typer-out{position:absolute;left:0;top:0;white-space:pre}\n  [data-typer] .typer-out::after{content:\"▌\";color:var(--accent);margin-left:1px;font-weight:300;animation:caretBlink 1s steps(1) infinite;text-shadow:0 0 8px var(--accent)}\n  [data-typer].done .typer-out::after{opacity:.35;animation:caretBlink 1.4s steps(1) infinite}\n  @keyframes caretBlink{50%{opacity:0}}\n  .about-body [data-typer]{color:var(--accent)}\n  .tl .pos [data-typer]{color:var(--paper)}\n\n  /* Marquee strip */\n  .strip{border-top:1px solid var(--line-strong);border-bottom:1px solid var(--line-strong);overflow:hidden;padding:14px 0;font-family:var(--mono);font-size:13px;color:var(--paper-dim)}\n  .strip-track{display:flex;gap:48px;white-space:nowrap;animation:slide 60s linear infinite;width:max-content}\n  .strip span{display:inline-flex;gap:48px}\n  .strip b{color:var(--paper);font-weight:500}\n  .strip .div{color:var(--accent);font-weight:400}\n  @keyframes slide{to{transform:translateX(-50%)}}\n\n  /* Tech icon marquee */\n  .strip-icons{padding:18px 0}\n  .strip-icons .strip-track{display:flex;gap:0;align-items:center;animation:slide 75s linear infinite;width:max-content}\n  .strip-icons .tech-mini{display:inline-flex;align-items:center;gap:10px;text-decoration:none;cursor:none;padding:0 20px}\n  .strip-icons .tech-mini .ico{position:relative;width:22px;height:22px;display:inline-block;flex:0 0 22px;transition:transform .25s}\n  .strip-icons .tech-mini:hover .ico{transform:scale(1.15)}\n  .strip-icons .tech-mini .ico img{position:abso ent\">designer's eye<\u002Fspan> for what ships.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"about-grid\">\n      <div><\u002Fdiv>\n      <div class=\"about-body\" data-liq=\"\">\n        <p>Sawad-dee — I'm <span data-typer=\"\">Oat<\u002Fspan>. I spend my days building web products with React, Next.js, TypeScript and TailwindCSS on the front, Node, Express, Laravel and PHP on the back.<\u002Fp>\n        <p class=\"mute\">I've shipped enterprise-grade tools: digital-signature platforms, BPM systems, internal dashboards. The kind of work where the user is a colleague and the SLA is \"yesterday\".<\u002Fp>\n        <p>I'm currently learning Golang and Python; researching Flutter and Elixir on the side. Looking ahead I want to grow into DevOps, cloud and data-engineering territory.<\u002Fp>\n        <p class=\"mute\">Self-motivated. Adaptive. I treat every codebase like a room I'd like to leave tidier than I found it.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"about-aside\">\n        <div class=\"stat\"><div class=\"label\">years shipping<\u002Fdiv><div class=\"val\">05<sup>+<\u002Fsup><\u002Fdiv><\u002Fdiv>\n        <div class=\"stat\"><div class=\"label\">primary stacks<\u002Fdiv><div class=\"val\">JS<sup>/PHP<\u002Fsup><\u002Fdiv><\u002Fdiv>\n        <div class=\"stat\"><div class=\"label\">currently @<\u002Fdiv><div class=\"val\">BKK<sup>↗<\u002Fsup><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SKILLS section removed - moved to running marquee above About -->\n\n  <!-- PROJECTS -->\n  <section id=\"projects\">\n    <div class=\"sec-head\">\n      <div class=\"sec-tag\">\n        <span class=\"num\">02.5 / projects<\u002Fspan>\n        <span class=\"thai\">ผลงาน<\u002Fspan>\n      <\u002Fdiv>\n      <h2 class=\"sec-title\" data-liq=\"\">Selected <span class=\"accent\">case studies.<\u002Fspan> <span style=\"color:var(--paper-mute);font-family:var(--mono);font-size:.4em;letter-spacing:.16em;text-transform:uppercase\"> deg, oklch(0.30 0.10 75), oklch(0.18 0.06 60))\">\n          <span class=\"badge\">freelance<\u002Fspan>\n          <span class=\"yr\">2020 — 2022<\u002Fspan>\n          <span class=\"glyph\">R·<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"proj-body\">\n          <span class=\"role\">solo build<\u002Fspan>\n          <h3>Reporting Dashboard Suite<\u002Fh3>\n          <p>Custom analytics dashboards for several agency clients. Real-time data viz with charts, drilldowns, exportable reports. Delivered solo on short timelines.<\u002Fp>\n          <div class=\"tags\"><span>React<\u002Fspan><span>Express<\u002Fspan><span>D3<\u002Fspan><span>Bootstrap<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"open\">case study →<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- EXPERIENCE -->\n  <section id=\"work\">\n    <div class=\"sec-head\">\n      <div class=\"sec-tag\">\n        <span class=\"num\">03 / log<\u002Fspan>\n        <span class=\"thai\">ประสบการณ์<\u002Fspan>\n      <\u002Fdiv>\n      <h2 class=\"sec-title\" data-liq=\"\">Five years of <span class=\"accent\">tickets closed<\u002Fspan> &amp; features shipped.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"timeline\">\n      <div class=\"tl now\">\n        <div class=\"when\"><span class=\"dot\">2024 — now<\u002Fspan><span>● active<\u002Fspan><\u002Fdiv>\n        <div class=\"role\">\n          <div class=\"pos\"><span data-typer=\"\">Full-stack engineer<\u002Fspan><\u002Fdiv>\n          <div class=\"org\">Enterprise SaaS · Bangkok<\u002Fdiv>\n          <div class=\"desc\">Lead front-end on a digital-signature platform serving thousands of corporate users. Migrating legacy modules to Next 15 + RSC; owning DX for a 6-engineer team.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stack\"><span>Next.js<\u002Fspan><span>TypeScript<\u002Fspan><span>Tailwind<\u002Fspan><span>Node<\u002Fspan><span>PostgreSQL<\u002Fspan><span>Docker<\u002Fspan><\u002Fdiv>\n      <\u0 u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section class=\"contact\" id=\"contact\">\n    <div class=\"sec-head\">\n      <div class=\"sec-tag\">\n        <span class=\"num\">04 / ping<\u002Fspan>\n        <span class=\"thai\">ติดต่อ<\u002Fspan>\n      <\u002Fdiv>\n      <div><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"contact-grid\">\n      <div>\n        <h2 data-liq=\"\"><span class=\"blk\">let's<\u002Fspan><br>build <span class=\"accent\">something_<\u002Fspan><\u002Fh2>\n        <div class=\"contact-thai\">ส่งอีเมลมาทักทาย หรือชวนทำโปรเจกต์ก็ได้นะ<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"contact-links\">\n        <a class=\"clink\" href=\"mailto:i.boonyarakthunya@gmail.com\">\n          <span class=\"lbl\">email<\u002Fspan>\n          <span class=\"val\">i.boonyarakthunya@gmail.com<\u002Fspan>\n          <span class=\"arr\">↗<\u002Fspan>\n        <\u002Fa>\n        <a class=\"clink\" href=\"tel:+66972471491\">\n          <span class=\"lbl\">phone<\u002Fspan>\n          <span class=\"val\">+66 97 247 1491<\u002Fspan>\n          <span class=\"arr\">↗<\u002Fspan>\n        <\u002Fa>\n        <a class=\"clink\" href=\"https://github.com/S09Z\">\n          <span class=\"lbl\">github<\u002Fspan>\n          <span class=\"val\">github.com/S09Z<\u002Fspan>\n          <span class=\"arr\">↗<\u002Fspan>\n        <\u002Fa>\n        <a class=\"clink\" href=\"https://www.linkedin.com/in/ittichaib/\">\n          <span class=\"lbl\">linkedin<\u002Fspan>\n          <span class=\"val\">/in/ittichaib<\u002Fspan>\n          <span class=\"arr\">↗<\u002Fspan>\n        <\u002Fa>\n        <a class=\"clink\" href=\"#\">\n          <span class=\"lbl\">resume<\u002Fspan>\n          <span class=\"val\">resume.pdf — 2026<\u002Fspan>\n          <span class=\"arr\">↗<\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer>\n    <div>© 2026 · ittichai b. · built with care in bangkok<\u002Fdiv>\n    <div class=\"ascii\">[ s09z::end_of_transmission ]<\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fmain>\n\n<script>\n/* ============ Back to top ============ */\nconst toTop = document.getElementById('toTop');\naddEventListener('scroll', () => {\n  toTop.classList.toggle('show', window.scrollY > window.innerHeight * 0.6);\n}, {passive:true});\ntoTop.addEventListener('click', () => {\n  jumpTarget.textContent = '$ goto #top';\n  jumpInd.classList.remove('on');\n  void jumpInd.offsetWidth;\n  jumpInd.classList.add('on');\n  window.scrollTo({top:0, behavior:'smooth'});\n});\n\n/* ============ Typewriter (cursor typo) effect on [data-typer] ============ */\ndocument.querySelectorAll('[data-typer]').forEach(el => {\n  const text = el.textContent;\n  el.dataset.text = text;\n  el.innerHTML = `<i class=\"typer-ghost\" aria-hidden=\"true\">${text}<\u002Fi><span class=\"typer-out\"><\u002Fspan>`;\n});\nconst typerIO = new IntersectionObserver(entries => {\n  entries.forEach(en => {\n    if(!en.isIntersecting) return;\n    const el = en.target;\n    if(el.classList.contains('typing') || el.classList.contains('done')) return;\n    el.classList.add('typing');\n    const text = el.dataset.text;\n    const out = el.querySelector('.typer-out');\n    let i = 0;\n    const tick = () => {\n      if(i <= text.length){\n        out.textContent = text.slice(0, i);\n        i++;\n        setTimeout(tick, 55 + Math.random()*60);\n      } else {\n        el.classList.remove('typing');\n        el.classList.add('done');\n        typerIO.unobserve(el);\n      }\n    };\n    setTimeout(tick, 180);\n  });\n}, {threshold: 0.6});\ndocument.querySelectorAll('[data-typer]').forEach(t => typerIO.observe(t));\n\n/* ============ Nav: smooth scroll + scrollspy + arrival flash ============ */\nconst navLinks = document.querySelectorAll('.topbar nav a');\nconst sections = [...document.querySelectorAll('main section[id]')];\nconst jumpInd = document.getElementById('jumpInd');\nconst jumpTarget = document.getElementById('jumpTarget');\n\nfunction labelFor(id){\n  const sec = document.getElementById(id);\n  const tag = sec && sec.querySelector('.sec-tag .num');\n  return tag ? tag.textContent.trim() : '/' + id;\n}\n\nnavLinks.forEach(a => {\n  a.addEventListener('click', e => {\n    const href = a.getAttribute('href');\n    if(!href || !href.startsWith('#')) return;\n    const target = document.querySelector(href);\n    if(!target) return;\n    e.preventDefault();\n\n    // Show jump indicator\n    jumpTarget.textContent = '$ goto ' + href;\n    jumpInd.classList.remove('on');\n    void jumpInd.offsetWidth; // restart anim\n    jumpInd.classList.add('on');\n\n    // Smooth scroll to target (scroll-margin-top covers sticky bar offset)\n    target.scrollIntoView({behavior:'smooth', block:'start'});\n\n    // Flash arrival once scroll lands\n    document.querySelectorAll('section.flash').forEach(s=>s.classList.remove('flash'));\n    const tickFlash = () => {\n      const rect = target.getBoundingClientRect();\n      if(Math.abs(rect.top) < 4){\n        target.classList.add('flash');\n        setTimeout(()=>target.classList.remove('flash'), 1200);\n      } else {\n        requestAnimationFrame(tickFlash);\n      }\n    };\n    setTimeout(tickFlash, 250);\n\n    // Optimistic active state\n    navLinks.forEach(n => n.classList.toggle('active', n === a));\n  });\n});\n\n// Scrollspy: highlight current section\nconst spy = new IntersectionObserver(entries => {\n  entries.forEach(en => {\n    if(en.isIntersecting){\n      const id = en.target.id;\n      navLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + id));\n    }\n  });\n}, {rootMargin:'-40% 0px -55% 0px', threshold:0});\nsections.forEach(s => spy.observe(s));\n\n// Keyboard: jump shortcuts\naddEventListener('keydown', e => {\n  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n  const map = {'1':'#about','2':'#projects','3':'#work','4':'#contact','0':'#top'};\n  if(map[e.key]){\n    e.preventDefault();\n    const link = document.querySelector('.topbar nav a[href=\"'+map[e.key]+'\"]');\n    if(link) link.click();\n    else document.querySelector(map[e.key])?.scrollIntoView({behavior:'smooth'});\n  }\n});\n\n/* ============ Liquid cursor ============ */\nconst ring = document.getElementById('cring');\nconst dot = document.getElementById('cdot');\nlet mx=window.innerWidth/2, my=window.innerHeight/2, rx=mx, ry=my;\nwindow.addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; dot.style.transform=`translate(${mx}px,${my}px) translate(-50%,-50%)`; });\n\n/* ============ Liquid type distortion ============ */\n// split each [data-liq] into chars\ndocument.querySelectorAll('[data-liq]').forEach(el=>{\n  const walk = (node)=>{\n    if(node.nodeType===3){\n      const frag = document.createDocumentFragment();\n      [...node.textContent].forEach(c=>{\n        const s = document.createElement('span');\n        s.className='ch'; s.textContent = c==' '?'\\u00A0':c;\n        frag.appendChild(s);\n      });\n      node.parentNode.replaceChild(frag, node);\n    } else if(node.nodeType===1){\n      // Skip subtrees that have their own text behavior\n      if(node.hasAttribute && (node.hasAttribute('data-typer') || node.classList.contains('typer-out') || node.classList.contains('typer-ghost'))) return;\n      [...node.childNodes].forEach(walk);\n    }\n  };\n  walk(el);\n});\nconst chars = document.querySelectorAll('.ch');\n\nfunction loop(){\n  rx += (mx-rx)*0.18; ry += (my-ry)*0.18;\n  ring.style.transform=`translate(${rx}px,${ry}px) translate(-50%,-50%)`;\n  liquify();\n  requestAnimationFrame(loop);\n}\nloop();\n\ndocument.querySelectorAll('a,button,.skill,.clink,.proj,.tw-swatch,.tw-seg button,.tech').forEach(el=>{\n  el.addEventListener('mouseenter',()=>ring.classList.add('hover'));\n  el.addEventListener('mouseleave',()=>ring.classList.remove('hover'));\n});\n\nfunction liquify(){\n  const R = 140;\n  chars.forEach(c=>{\n    const r = c.getBoundingClientRect();\n    const cx = r.left + r.width/2;\n    const cy = r.top + r.height/2;\n    const dx = cx - mx, dy = cy - my;\n    const d = Math.hypot(dx,dy);\n    if(d < R){\n      const f = (1 - d/R);\n      const ang = Math.atan2(dy,dx);\n      const ox = Math.cos(ang) * 18 * f;\n      const oy = Math.sin(ang) * 18 * f;\n      const sc = 1 + f*0.5;\n      const rot = (dx/R)*8 * f;\n      c.style.transform = `translate(${ox}px,${oy}px) scale(${sc}) rotate(${rot}deg)`;\n      c.style.color = `oklch(${0.74 + f*0.1} 0.18 295)`;\n    } else if(c.style.transform){\n      c.style.transform=''; c.style.color='';\n    }\n  });\n}\n\n/* ============ Clock ============ */\nconst clock = document.getElementById('clock');\nsetInterval(()=>{\n  const d = new Date();\n  const opts = {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false,timeZone:'Asia/Bangkok'};\n  clock.textContent = d.toLocaleTimeString('en-GB',opts) + ' ICT';\n},1000);\n\n/* ============ Stack ============ */\n// [display name, simple-icons slug, since year]\nconst STACK = [\n  {\n    cat: 'languages', label: 'Languages', meta: 'primary daily',\n    items: [\n      ['TypeScript','typescript','2020'],\n      ['JavaScript','javascript','2019'],\n      ['PHP','php','2019'],\n      ['Go','go','2024'],\n      ['Elixir','elixir','2025'],\n      ['Python','python','2024'],\n    ]\n  },\n  {\n    cat: 'frontend', label: 'Frontend & UI', meta: '6+ yrs shipping',\n    items: [\n      ['React','react','2019'],\n      ['Next.js','nextdotjs','2020'],\n      ['Vue.js','vuedotjs','2021'],\n      ['Nuxt','nuxt','2021'],\n      ['Tailwind','tailwindcss','2021'],\n      ['Bootstrap','bootstrap','2019'],\n      ['HTML5','html5','2018'],\n      ['CSS3','css','2018'],\n    ]\n  },\n  {\n    cat: 'backend', label: 'Backend & APIs', meta: 'production',\n    items: [\n      ['Node.js','nodedotjs','2019'],\n      ['Express','express','2019'],\n      ['Laravel','laravel','2019'],\n      ['NestJS','nestjs','2022'],\n    ]\n  },\n  {\n    cat: 'data', label: 'Data & Infra', meta: 'fluent',\n    items: [\n      ['PostgreSQL','postgresql','2021'],\n      ['MySQL','mysql','2019'],\n      ['Docker','docker','2022'],\n      ['Git','git','2019'],\n      ['Jest','jest','2021'],\n      ['Linux','linux','2020'],\n    ]\n  },\n];\nconst stripTrack = document.getElementById('stripTrack');\nif(stripTrack){\n  const flat = STACK.flatMap(g => g.items);\n  const buildSet = () => {\n    const set = document.createElement('span');\n    set.style.display = 'inline-flex';\n    set.style.gap = '36px';\n    set.style.alignItems = 'center';\n    flat.forEach(([nm, slug, yr], i) => {\n      const a = document.createElement('a');\n      a.className = 'tech-mini';\n      a.href = '#';\n      a.title = `${nm} · since ${yr}`;\n      a.innerHTML = `\n        <span class=\"ico\">\n          <img class=\"mono\" src=\"https://cdn.simpleicons.org/${slug}/e8e8f0\" alt=\"\" loading=\"lazy\">\n          <img class=\"brand\" src=\"https://cdn.simpleicons.org/${slug}\" alt=\"\" loading=\"lazy\">\n        <\u002Fspan>\n        <span class=\"lbl\">${nm}<\u002Fspan>\n        <span class=\"dot\">◆<\u002Fspan>`;\n      set.appendChild(a);\n    });\n    return set;\n  };\n  stripTrack.appendChild(buildSet());\n  stripTrack.appendChild(buildSet());\n}\n\n/* ============ WebGL-ish noise background (canvas 2d, lightweight) ============ */\nconst cv = document.getElementById('bg');\nconst cx = cv.getContext('2d');\nfunction resize(){ cv.width = innerWidth; cv.height = innerHeight; }\nresize(); addEventListener('resize',resize);\n\n// pre-render a noise tile\nconst noise = document.createElement('canvas');\nnoise.width = noise.height = 256;\nconst nctx = noise.getContext('2d');\nconst img = nctx.createImageData(256,256);\nfor(let i=0;i<img.data.length;i+=4){\n  const v = Math.random()*255|0;\n  img.data[i]=v; img.data[i+1]=v; img.data[i+2]=v; img.data[i+3]=14;\n}\nnctx.putImageData(img,0,0);\n\nlet t=0;\nfunction drawBg(){\n  t += 0.004;\n  const w = cv.width, h = cv.height;\n  // gradient mesh: 3 radial purples drifting\n  cx.clearRect(0,0,w,h);\n  const blobs = [\n    {x: w*(0.3+0.15*Math.sin(t)), y:h*(0.3+0.12*Math.cos(t*0.7)), r:w*0.5, c:'rgba(143,108,255,0.18)'},\n    {x: w*(0.7+0.12*Math.cos(t*0.6)), y:h*(0.6+0.1*Math.sin(t*0.8)), r:w*0.45, c:'rgba(96,76,200,0.16)'},\n    {x: w*(0.5+0.1*Math.sin(t*0.4)), y:h*(0.9+0.06*Math.cos(t*0.5)), r:w*0.5, c:'rgba(60,120,200,0.10)'},\n  ];\n  blobs.forEach(b=>{\n    const g = cx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);\n    g.addColorStop(0,b.c); g.addColorStop(1,'rgba(0,0,0,0)');\n    cx.fillStyle = g; cx.fillRect(0,0,w,h);\n  });\n  // noise overlay\n  const pat = cx.createPattern(noise,'repeat');\n  cx.fillStyle = pat;\n  cx.globalCompositeOperation = 'screen';\n  cx.fillRect(0,0,w,h);\n  cx.globalCompositeOperation = 'source-over';\n  requestAnimationFrame(drawBg);\n}\ndrawBg();\n\n/* ============ Typed prompt on load ============ */\nconst typed = document.querySelector('.hero-prompt .typed');\nconst fullText = typed.textContent;\ntyped.textContent = '';\nlet ti=0;\nconst typeIt = ()=>{\n  if(ti<=fullText.length){ typed.textContent = fullText.slice(0,ti); ti++; setTimeout(typeIt, 55); }\n};\nsetTimeout(typeIt, 350);\n<\u002Fscript>\n<script src=\"f97da2be-782b-4932-8e0d-380f8ab2bcf5\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
